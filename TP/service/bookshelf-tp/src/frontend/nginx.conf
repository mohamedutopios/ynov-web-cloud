# nginx.conf — Configuration du serveur frontend BookShelf
#
# Rôles :
#   1. Servir les fichiers statiques React (HTML, CSS, JS)
#   2. Rediriger toutes les routes inconnues vers index.html (SPA React Router)
#   3. Proxifier /api/* vers le service backend Kubernetes

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Fichiers statiques React ──────────────────────────────────────────────
    # Tente de servir le fichier demandé, sinon redirige vers index.html
    # Nécessaire pour le routing côté client de React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy vers l'API backend ──────────────────────────────────────────────
    # Toutes les requêtes /api/* sont redirigées vers le Service K8s "backend"
    # En K8s, "backend-service" est résolu par le DNS interne du cluster
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
